<html lang="es">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --sage:#4a7c59;--sage-pale:#eef4f0;
  --amber:#d4813a;--amber-pale:#fdf3e7;
  --blue:#2c4a8c;--blue-pale:#eef1fa;
  --red:#c0392b;--plum:#6b3a6b;
  --ink:#1a1a1a;--gray:#777;--lgray:#ccc;--vlgray:#f2f0eb;--cream:#faf8f3;
  --bg:var(--cream);--surface:#fff;--border:#e0ddd8;--text:var(--ink);--text2:var(--gray);
  --radius:10px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#111;--surface:#1c1c1e;--border:#333;--text:#f0ede8;--text2:#999;--vlgray:#222;--cream:#111;}
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;}

/* TOP BAR */
.topbar{padding:12px 16px 8px;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.topbar-row1{display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-size:17px;font-weight:600;color:var(--text);}
.topbar-jp{font-size:12px;color:var(--text2);}
.streak{font-size:13px;font-weight:600;color:#d4813a;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
.stat{background:var(--vlgray);border-radius:8px;padding:6px 4px;text-align:center;}
.stat-n{font-size:16px;font-weight:600;}
.stat-l{font-size:9px;color:var(--text2);margin-top:1px;}
.prog-wrap{height:3px;background:var(--vlgray);border-radius:2px;margin-top:8px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;background:var(--sage);transition:width 0.4s;}

/* NAV BAR */
.navbar{display:flex;background:var(--surface);border-top:0.5px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-bottom);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;cursor:pointer;color:var(--text2);font-size:10px;gap:3px;border:none;background:none;}
.nav-item.active{color:var(--sage);}
.nav-item i{font-size:22px;}

/* CONTENT SCROLL */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px 8px;}

/* DAY NAVIGATION */
.day-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.day-nav-btn{width:36px;height:36px;border-radius:50%;border:0.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-size:18px;flex-shrink:0;}
.day-nav-label{flex:1;text-align:center;font-size:14px;font-weight:500;}

/* DAY PANEL */
.day-panel{border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border);margin-bottom:10px;background:var(--surface);}
.day-hdr{padding:11px 14px;display:flex;justify-content:space-between;align-items:center;}
.day-hdr-title{font-size:15px;font-weight:600;color:white;}
.day-hdr-sub{font-size:11px;color:rgba(255,255,255,0.7);}

/* KANJI CARDS */
.kanji-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 12px;}
.kanji-card{border:0.5px solid var(--border);border-radius:8px;padding:9px;display:flex;gap:8px;background:var(--surface);}
.kanji-char{font-size:26px;color:var(--sage);font-weight:600;line-height:1;display:flex;align-items:center;padding-right:8px;border-right:0.5px solid var(--border);}
.kanji-info{flex:1;min-width:0;}
.kanji-on{font-size:10px;color:var(--red);font-weight:600;}
.kanji-kun{font-size:10px;color:var(--sage);}
.kanji-meaning{font-size:11px;font-weight:600;margin-top:2px;}
.kanji-ex{font-size:10px;color:var(--text2);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* GRAMMAR CARD */
.gram-card{margin:0 12px 10px;border:0.5px solid var(--blue);border-radius:8px;padding:10px;background:var(--blue-pale);}
.gram-struct{font-size:14px;font-weight:600;color:var(--red);margin-bottom:3px;}
.gram-meaning{font-size:12px;color:var(--text2);}
.gram-ex{font-size:12px;color:var(--text2);margin-top:4px;font-style:italic;}

/* TASKS */
.section-lbl{padding:6px 14px 4px;font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;border-top:0.5px solid var(--border);}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-top:0.5px solid var(--border);cursor:pointer;-webkit-user-select:none;}
.task-row:active{background:var(--vlgray);}
.task-row.done .task-text{text-decoration:line-through;color:var(--text2);}
.checkbox{width:20px;height:20px;border:1.5px solid var(--border);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.15s;}
.task-row.done .checkbox{background:var(--sage);border-color:var(--sage);color:white;}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.b-amber{background:var(--amber);color:white;}
.b-sage{background:var(--sage);color:white;}
.b-blue{background:var(--blue);color:white;}
.task-text{font-size:13px;line-height:1.4;flex:1;}
.task-sub{font-size:10px;color:var(--text2);margin-top:2px;}
.task-opt{font-size:10px;color:var(--text2);font-style:italic;}

/* CALENDAR */
.month-block{margin-bottom:16px;}
.month-title{font-size:13px;font-weight:600;padding:6px 0;margin-bottom:6px;border-bottom:2px solid;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-hdr{text-align:center;font-size:10px;font-weight:500;color:var(--text2);padding:3px 0;}
.cal-hdr.fri{color:var(--amber);}
.cal-hdr.we{color:var(--red);}
.cal-cell{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:12px;font-weight:500;position:relative;background:var(--surface);border:0.5px solid var(--border);}
.cal-cell:active{opacity:0.7;}
.cal-cell.done{background:var(--sage-pale);border-color:var(--sage);}
.cal-cell.done::after{content:"✓";position:absolute;top:1px;right:2px;font-size:7px;color:var(--sage);}
.cal-cell.today{border-color:var(--blue);border-width:1.5px;}
.cal-cell.fri{background:var(--amber-pale);}
.cal-cell.we{background:#fff5f5;}
.cal-cell.past{opacity:0.35;}
.cal-cell.exam{border-color:var(--red);border-width:1.5px;}
.cal-cell.exam::before{content:"★";position:absolute;bottom:1px;font-size:7px;color:var(--red);}
.cal-k{font-size:6px;color:var(--text2);line-height:1;}
.cal-empty{aspect-ratio:1;}

/* INDEX */
.search-bar{width:100%;padding:9px 12px;border:0.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);color:var(--text);margin-bottom:10px;}
.idx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:5px;}
.idx-item{display:flex;align-items:center;gap:6px;padding:7px 8px;border:0.5px solid var(--border);border-radius:8px;cursor:pointer;background:var(--surface);}
.idx-item:active{opacity:0.7;}
.idx-item.done{background:var(--sage-pale);border-color:var(--sage);}
.idx-check{width:14px;height:14px;border:1px solid var(--border);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}
.idx-item.done .idx-check{background:var(--sage);border-color:var(--sage);color:white;}
.idx-kanji{font-size:16px;font-weight:600;}
.idx-meaning{font-size:10px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.gr-item{display:flex;gap:8px;padding:9px 10px;border:0.5px solid var(--border);border-radius:8px;cursor:pointer;background:var(--surface);margin-bottom:5px;}
.gr-item:active{opacity:0.7;}
.gr-item.done{background:var(--blue-pale);border-color:var(--blue);}
.gr-check{width:14px;height:14px;border:1px solid var(--border);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;margin-top:2px;}
.gr-item.done .gr-check{background:var(--blue);border-color:var(--blue);color:white;}
.gr-struct{font-size:12px;font-weight:600;color:var(--red);min-width:0;}
.gr-meaning{font-size:11px;color:var(--text2);flex:1;}
.sec-lbl2{font-size:11px;font-weight:600;color:var(--text2);margin:10px 0 5px;}
</style>
</head>

let ST={},curDate=new Date(),curView='day';
curDate.setHours(0,0,0,0);

function load(){try{ST=JSON.parse(localStorage.getItem('hobo_n4')||'{}')}catch(e){ST={}}}
function save(){try{localStorage.setItem('hobo_n4',JSON.stringify(ST))}catch(e){}}
function dkey(d){return d.toISOString().slice(0,10)}
function di(d){return Math.max(0,Math.floor((d-START)/86400000))}
function gk(idx){const ki=(idx*2)%KANJI.length;return[KANJI[ki],KANJI[(ki+1)%KANJI.length]]}
function gg(idx){return GRAMMAR[idx%GRAMMAR.length]}
function isFri(d){return d.getDay()===5}
function isSat(d){return d.getDay()===6}
function isSun(d){return d.getDay()===0}

function tasksForDay(d){
  const idx=di(d),dow=d.getDay(),key=dkey(d);
  const[k1,k2]=gk(idx);const gr=gg(idx);
  if(key==='2026-12-06')return[{id:'exam',text:'¡Día del examen JLPT N4! Confía en tu trabajo. 頑張って！',opt:false}];
  if(dow===5)return[
    {id:'f1',text:'Repaso Anki — tarjetas vencidas de la semana',b:'10 min',bc:'b-amber',opt:false},
    {id:'f2',text:'Repasa los kanji de esta semana: léelos y escríbelos',b:'10 min',bc:'b-amber',opt:false},
    {id:'f3',text:'Repasa los puntos de gramática de esta semana',b:'10 min',bc:'b-amber',opt:false},
    {id:'f4',text:'Noche: Listening suave — Chika Sensei sin notas',b:'10 min',bc:'b-amber',opt:false},
  ];
  if(dow===6)return[
    {id:'s1',text:'Repaso semanal de gramática — ejercicios del libro',b:'30 min',bc:'b-sage',opt:false},
    {id:'s2',text:'Lectura N4: NHK Web Easy o libro',b:'30 min',bc:'b-sage',opt:false},
    {id:'s3',text:'Kanji de la semana: escribe frases propias',b:'30 min',bc:'b-sage',opt:false},
    {id:'s4',text:'Repaso Anki del día',b:'10 min',bc:'b-sage',opt:false},
  ];
  if(dow===0)return[
    {id:'su1',text:'Simulacro de sección del examen',b:'45 min',bc:'b-blue',opt:false},
    {id:'su2',text:'Listening JLPT N4 sin subtítulos',b:'30 min',bc:'b-blue',opt:false},
    {id:'su3',text:'Planifica la semana siguiente',b:'15 min',bc:'b-blue',opt:false},
    {id:'su4',text:'Repaso Anki del día',b:'10 min',bc:'b-blue',opt:false},
  ];
  const ak=idx>0?`Kanji #${Math.max(1,(idx*2)%KANJI.length-9)}–${(idx*2)%KANJI.length}`:'¡Primer día!';
  const ag=idx>0?`Gram. #${Math.max(1,idx%GRAMMAR.length-4)}–${idx%GRAMMAR.length}`:'¡Primer día!';
  return[
    {id:'w1',text:'Repaso Anki',sub:ak+' · '+ag,b:'10 min',bc:'b-amber',opt:false},
    {id:'w2',text:'Gramática: '+gr[0],sub:gr[1],b:'15 min',bc:'b-blue',opt:false},
    {id:'w3',text:'Kanji: '+k1[0]+' '+k2[0],sub:'historia visual + escritura + Anki',b:'10 min',bc:'b-sage',opt:false},
    {id:'w4',text:'Lección Chika Sensei + vocabulario → Anki',b:'10 min',bc:'b-sage',opt:false},
    {id:'w5',text:'Noche: Listening (10 min) + Anki nocturno (5 min)',b:'15 min',bc:'b-blue',opt:false},
    {id:'w6',text:'Tarea personal / nota:',opt:true},
  ];
}

function toggle(key,tid){
  if(!ST[key])ST[key]={};
  if(!ST[key].t)ST[key].t={};
  ST[key].t[tid]=!ST[key].t[tid];
  const tasks=tasksForDay(new Date(key));
  const req=tasks.filter(t=>!t.opt);
  if(req.every(t=>ST[key].t[t.id])){ST[key].done=true;}
  save();render();
}
function toggleK(i){ST['k'+i]=!ST['k'+i];save();render();}
function toggleG(i){ST['g'+i]=!ST['g'+i];save();render();}

function dayColor(d){
  const m=d.getMonth()+1;
  if(isFri(d))return'#d4813a';
  if(isSat(d))return'#4a7c59';
  if(isSun(d))return'#2c4a8c';
  return{5:'#2e6b4f',6:'#2c4a8c',7:'#c0392b',8:'#d4813a',9:'#6b3a6b',10:'#8b4513',11:'#2e7d7d',12:'#1a1a2e'}[m]||'#4a7c59';
}

  const d=curDate,idx=di(d),key=dkey(d);

  if(!inRange){h+=`<div style="padding:20px;text-align:center;color:var(--text2);font-size:13px">Fuera del periodo del plan</div>`;h+=`</div>`;return h;}
  if(key==='2026-12-06'){
    h+=`<div style="padding:20px;text-align:center">
      <div style="font-size:40px;margin-bottom:8px">★</div>
      <div style="font-size:16px;font-weight:600;color:var(--red);margin-bottom:10px">¡Día del JLPT N4!</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.9">Has estudiado desde el 6 de mayo.<br>179 kanji · 66 puntos de gramática.<br>Listening cada noche.<br><br><strong style="color:var(--sage)">Confía en tu trabajo. ¡Tú puedes!</strong><br>頑張って、Patri！</div>
    </div>`;
    h+=`</div>`;return h;

  if(isWD){
    h+=`<div class="kanji-grid">`;

    h+=`</div>`;
    h+=`<div style="padding:0 12px 10px"><div class="gram-card"><div class="gram-struct">${gr[0]}</div><div class="gram-meaning">${gr[1]}</div><div class="gram-ex">${gr[2]}</div></div></div>`;
  }
  h+=`<div class="section-lbl">Checklist del día</div>`;
  for(const t of tasks){
    const done=ST[key]&&ST[key].t&&ST[key].t[t.id];
    h+=`<div class="task-row${done?' done':''}" onclick="toggle('${key}','${t.id}')">
      <div class="checkbox">${done?'✓':''}</div>

      <div style="flex:1;min-width:0"><div class="task-text">${t.text}</div>${t.sub?`<div class="task-sub">${t.sub}</div>`:''}${t.opt?'<div class="task-opt">espacio para tus notas</div>':''}</div>

function renderCal(){
  const months=[5,6,7,8,9,10,11,12];
  const names={5:'Mayo',6:'Junio',7:'Julio',8:'Agosto',9:'Septiembre',10:'Octubre',11:'Noviembre',12:'Diciembre'};
  const today=new Date();today.setHours(0,0,0,0);
  let h='';
  for(const m of months){
    const col=MON_COL[m];
    h+=`<div class="month-block"><div class="month-title" style="color:${col};border-color:${col}">${names[m]} 2026</div>`;
    h+=`<div class="cal-grid"><div class="cal-hdr">L</div><div class="cal-hdr">M</div><div class="cal-hdr">X</div><div class="cal-hdr">J</div><div class="cal-hdr fri">V</div><div class="cal-hdr we">S</div><div class="cal-hdr we">D</div>`;
    const first=new Date(2026,m-1,1);
    let off=first.getDay()-1;if(off<0)off=6;
    for(let i=0;i<off;i++)h+=`<div class="cal-empty"></div>`;
    const days=new Date(2026,m,0).getDate();
    for(let d2=1;d2<=days;d2++){
      const dd=new Date(2026,m-1,d2);dd.setHours(0,0,0,0);
      const k=dkey(dd);const isT=dd.getTime()===today.getTime();
      const before=dd<START,after=dd>END;
      const done2=ST[k]&&ST[k].done;
      const dow2=dd.getDay();
      const fri2=dow2===5,we2=dow2===0||dow2===6,exam2=k==='2026-12-06';
      let cls='cal-cell';
      if(done2)cls+=' done';if(isT)cls+=' today';
      if(fri2&&!before&&!after)cls+=' fri';
      if(we2&&!before&&!after)cls+=' we';
      if(before||after)cls+=' past';if(exam2)cls+=' exam';
      const idx2=di(dd);const[kk1,kk2]=gk(idx2);
      h+=`<div class="${cls}" onclick="goDate(new Date(2026,${m-1},${d2}))">${d2}${!before&&!after&&!we2&&!fri2?`<span class="cal-k">${kk1[0]}${kk2[0]}</span>`:''}</div>`;
    }
    h+=`</div></div>`;
  }
  return h;
}

  <div class="idx-grid" id="kg">`;
  for(let i=0;i<KANJI.length;i++){
    const k=KANJI[i],done=ST['k'+i];

  let h=`<input class="search-bar" type="search" placeholder="Buscar estructura o significado..." oninput="filterG(this.value)">

  <div id="gg">`;
  for(let i=0;i<GRAMMAR.length;i++){
    const g=GRAMMAR[i],done=ST['g'+i];

function filterK(q){
  document.querySelectorAll('[id^="ki"]').forEach((el,i)=>{
    const k=KANJI[i];
    el.style.display=(!q||k[0].includes(q)||k[3].toLowerCase().includes(q))?'':'none';
  });
}
function filterG(q){
  document.querySelectorAll('[id^="gi"]').forEach((el,i)=>{
    const g=GRAMMAR[i];
    el.style.display=(!q||g[0].includes(q)||g[1].toLowerCase().includes(q))?'':'none';
  });
}

function updateStats(){
  const today=new Date();today.setHours(0,0,0,0);
  const total=Math.floor((END-START)/86400000)+1;
  const daysLeft=Math.max(0,Math.floor((END-today)/86400000));
  const done=Object.values(ST).filter(v=>v&&v.done).length;
  const kd=KANJI.filter((_,i)=>ST['k'+i]).length;
  const gd=GRAMMAR.filter((_,i)=>ST['g'+i]).length;
  document.getElementById('stDone').textContent=done;
  document.getElementById('stKanji').textContent=kd;
  document.getElementById('stGram').textContent=gd;
  document.getElementById('stLeft').textContent=daysLeft;
  document.getElementById('progBar').style.width=Math.round(done/total*100)+'%';
  let streak=0,check=new Date(today);
  while(ST[dkey(check)]&&ST[dkey(check)].done){streak++;check.setDate(check.getDate()-1);}
  document.getElementById('streakBadge').textContent='🔥 '+streak+' día'+(streak!==1?'s':'');
}

function prevDay(){curDate.setDate(curDate.getDate()-1);render();}
function nextDay(){curDate.setDate(curDate.getDate()+1);render();}
function goDate(d){curDate=d;curDate.setHours(0,0,0,0);setView('day');}

function setView(v){
  curView=v;
  ['day','cal','kanji','gram'].forEach(x=>{
    const btn=document.getElementById('nb-'+x);
    if(btn)btn.className='nav-item'+(x===v?' active':'');
  });
  render();
}

function render(){
  updateStats();
  const c=document.getElementById('content');
  if(curView==='day')c.innerHTML=renderDay();
  else if(curView==='cal')c.innerHTML=renderCal();
  else if(curView==='kanji')c.innerHTML=renderKanji();
  else if(curView==='gram')c.innerHTML=renderGram();
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

load();render();
</script>
</body>
</html>
